# render.yaml  (repo root)
services:
  - type: web
    name: kuduwallet-api
    runtime: dotnet
    region: frankfurt  # closest to South Africa
    branch: main
    rootDir: kuduWallet/KuduWallet.API
    buildCommand: dotnet publish KuduWallet.API.csproj -c Release -o out
    startCommand: dotnet out/KuduWallet.API.dll
    healthCheckPath: /health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://+:10000
      - key: ConnectionStrings__DefaultConnection
        sync: false   # means you set this manually in Render dashboard (keeps secrets out of git)
      - key: Jwt__Secret
        sync: false
      - key: Jwt__Issuer
        sync: false
      - key: Jwt__Audience
        sync: false
      - key: Google__ClientId
        sync: false
      - key: Google__ClientSecret
        sync: false
