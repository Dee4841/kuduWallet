trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  buildConfiguration: 'Release'
  backendPath: 'backend/KuduWallet.API'
  frontendPath: 'frontend/kuduwalletclient'

stages:

# ─────────────────────────────────────────
# STAGE 1: BUILD & TEST BACKEND
# ─────────────────────────────────────────
- stage: Backend
  displayName: 'Build & Test Backend'
  jobs:
  - job: BuildBackend
    displayName: 'Build ASP.NET Core API'
    steps:

    - task: UseDotNet@2
      displayName: 'Use .NET 8'
      inputs:
        packageType: 'sdk'
        version: '8.x'

    - script: dotnet restore
      displayName: 'Restore dependencies'
      workingDirectory: '$(backendPath)'

    - script: dotnet build --configuration $(buildConfiguration)
      displayName: 'Build backend'
      workingDirectory: '$(backendPath)'

    - script: dotnet publish --configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/backend
      displayName: 'Publish backend'
      workingDirectory: '$(backendPath)'

    - task: PublishBuildArtifacts@1
      displayName: 'Upload backend artifact'
      inputs:
        pathToPublish: '$(Build.ArtifactStagingDirectory)/backend'
        artifactName: 'backend'

# ─────────────────────────────────────────
# STAGE 2: BUILD & TEST FRONTEND
# ─────────────────────────────────────────
- stage: Frontend
  displayName: 'Build & Test Frontend'
  dependsOn: Backend
  jobs:
  - job: BuildFrontend
    displayName: 'Build React App'
    steps:

    - task: NodeTool@0
      displayName: 'Use Node.js 20'
      inputs:
        versionSpec: '20.x'

    - script: npm install
      displayName: 'Install dependencies'
      workingDirectory: '$(frontendPath)'

    - script: npm run build
      displayName: 'Build frontend'
      workingDirectory: '$(frontendPath)'

    - task: PublishBuildArtifacts@1
      displayName: 'Upload frontend artifact'
      inputs:
        pathToPublish: '$(frontendPath)/dist'
        artifactName: 'frontend'
