trigger:
  - main

pool:
  name: KuduWallet-pool

stages:

# -------------------------
# BACKEND (.NET)
# -------------------------
- stage: Backend
  displayName: Build Backend
  jobs:
  - job: BackendJob
    displayName: Backend Job
    steps:
    - checkout: self
    - task: UseDotNet@2
      displayName: Setup .NET
      inputs:
        packageType: 'sdk'
        version: '10.x'
        installationPath: $(Agent.ToolsDirectory)/dotnet
    - script: dotnet restore
      displayName: Restore
      workingDirectory: KuduWallet.API
    - script: dotnet build --no-restore
      displayName: Build
      workingDirectory: KuduWallet.API
    - script: |
        set PATH=$(Agent.ToolsDirectory)\dotnet;%PATH%
        dotnet test --no-build
      displayName: Test
      workingDirectory: KuduWallet.API

# -------------------------
# FRONTEND (React)
# -------------------------
- stage: Frontend
  displayName: Build Frontend
  dependsOn: Backend
  jobs:
  - job: FrontendJob
    displayName: Frontend Job
    steps:
    - checkout: self
    - task: NodeTool@1
      displayName: Setup Node
      inputs:
        version: '18.x'
    - script: npm install
      displayName: Install dependencies
      workingDirectory: KuduWalletClient
    - script: npm run build
      displayName: Build app
      workingDirectory: KuduWalletClient

# -------------------------
# DEPLOY — Trigger Render
# -------------------------
- stage: Deploy_Backend
  displayName: Deploy to Render
  dependsOn: Frontend
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  jobs:
  - job: DeployJob
    displayName: Trigger Render Deploy Hook
    steps:
    - script: |
        curl -X POST "$(RENDER_DEPLOY_HOOK_URL)" -o response.txt
        type response.txt
      displayName: Trigger Render deploy

# -------------------------
# DEPLOY — Trigger Vercel
# -------------------------
- stage: Deploy_Frontend
  displayName: Deploy to Vercel
  dependsOn: Deploy_Backend
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  jobs:
  - job: DeployJob
    displayName: Trigger Vercel Deploy Hook
    steps:
    - script: |
        curl -X POST "$(VERCEL_DEPLOY_HOOK_URL)" -o response.txt
        type response.txt
      displayName: Trigger Vercel deploy
