trigger:
  branches:
    include:
      - main
      - develop

pr:
  branches:
    include:
      - main

pool:
  name: KuduWallet-pool

variables:
  - group: kuduwallet-secrets

stages:

# -------------------------
# BACKEND — Build
# -------------------------
- stage: Backend_Build
  displayName: Build Backend
  jobs:
  - job: BackendBuildJob
    displayName: Build .NET API
    steps:

    - checkout: self

    - task: UseDotNet@2
      displayName: Setup .NET 10
      inputs:
        packageType: 'sdk'
        version: '10.x'

    - script: dotnet restore
      displayName: Restore dependencies
      workingDirectory: KuduWallet.API

    - script: dotnet build --no-restore --configuration Release
      displayName: Build (Release)
      workingDirectory: KuduWallet.API

# -------------------------
# BACKEND — Deploy to Render
# Only runs on main, after build passes
# -------------------------
- stage: Backend_Deploy
  displayName: Deploy Backend to Render
  dependsOn: Backend_Build
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  jobs:
  - job: DeployJob
    displayName: Trigger Render Deploy Hook
    steps:

    - script: |
        curl -s -X POST "$(RENDER_DEPLOY_HOOK_URL)" \
          -o response.txt \
          -w "\nHTTP Status: %{http_code}\n"
        cat response.txt
      displayName: Trigger Render deploy
